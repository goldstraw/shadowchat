<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowChat Block Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  body {
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Kalam', cursive;
  }

  svg {
    overflow: visible;
  }

  text {
    font-family: 'Kalam', cursive;
    fill: #1e1e1e;
  }
</style>
</head>
<body>
<svg width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1e1e1e" />
    </marker>
    <pattern id="diag-stripes" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="#fcf8e3" />
      <line x1="0" y1="0" x2="0" y2="10" stroke="#e8d9a0" stroke-width="3" />
    </pattern>
    <pattern id="noise-dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#e8e8e8" />
      <circle cx="3" cy="3" r="1" fill="#bbb" />
    </pattern>
  </defs>

  <!-- Title -->
  <text x="490" y="30" text-anchor="middle" font-size="27" font-weight="bold">ShadowChat Block Detail</text>

  <!-- Outer rectangle: full message -->
  <rect x="10" y="50" width="960" height="420" rx="3"
        fill="none" stroke="#1e1e1e" stroke-width="2" />

  <!-- === HEADER === -->
  <rect x="30" y="80" width="60" height="360" rx="2"
        fill="#f0e6ff" stroke="#1e1e1e" stroke-width="1.5" />
  <text x="60" y="270" text-anchor="middle" font-size="18" font-weight="bold" transform="rotate(-90, 60, 270)">Header</text>


  <!-- === REGULAR BLOCK === -->
  <rect x="110" y="80" width="400" height="360" rx="2"
        fill="#dff0d8" stroke="#1e1e1e" stroke-width="1.5" />
  <text x="310" y="105" text-anchor="middle" font-size="20" font-weight="bold">Regular Block</text>

  <!-- Encrypted wrapper -->
  <rect x="130" y="120" width="360" height="300" rx="2"
        fill="none" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="6 3" />
  <text x="310" y="145" text-anchor="middle" font-size="13" fill="#555">Encrypted with regular password</text>

  <!-- Plaintext -->
  <rect x="145" y="160" width="330" height="160" rx="2"
        fill="#a8d0a0" stroke="#1e1e1e" stroke-width="1" />
  <text x="310" y="245" text-anchor="middle" font-size="15" font-weight="bold">Plaintext</text>

  <!-- Random padding -->
  <rect x="145" y="330" width="330" height="70" rx="2"
        fill="url(#noise-dots)" stroke="#1e1e1e" stroke-width="1" />
  <text x="310" y="370" text-anchor="middle" font-size="13">Random Padding</text>

  <!-- === HIDDEN BLOCK === -->
  <rect x="530" y="80" width="420" height="360" rx="2"
        fill="url(#diag-stripes)" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="8 4" />
  <text x="740" y="105" text-anchor="middle" font-size="20" font-weight="bold">Hidden Block</text>

  <!-- Encrypted wrapper -->
  <rect x="550" y="120" width="380" height="300" rx="2"
        fill="none" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="6 3" />
  <text x="740" y="145" text-anchor="middle" font-size="13" fill="#555">Encrypted with hidden password</text>

  <!-- Plaintext -->
  <rect x="565" y="160" width="350" height="80" rx="2"
        fill="#e8d898" stroke="#1e1e1e" stroke-width="1" />
  <text x="740" y="205" text-anchor="middle" font-size="15" font-weight="bold">Plaintext</text>

  <!-- Random padding -->
  <rect x="565" y="250" width="350" height="150" rx="2"
        fill="url(#noise-dots)" stroke="#1e1e1e" stroke-width="1" />
  <text x="740" y="330" text-anchor="middle" font-size="13">Random Padding</text>

  <!-- OR label between blocks -->
  <text x="740" y="490" text-anchor="middle" font-size="16" fill="#888">If no hidden message: encrypted random noise</text>

  <!-- Fixed size annotation -->
  <text x="310" y="490" text-anchor="middle" font-size="16" fill="#888">Same fixed size</text>

  <!-- Equals sign between blocks -->
  <text x="520" y="270" text-anchor="middle" font-size="30" fill="#888">=</text>
</svg>
</body>
</html>
