<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowChat Deniability Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  body {
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Kalam', cursive;
  }

  svg {
    overflow: visible;
  }

  text {
    font-family: 'Kalam', cursive;
    fill: #1e1e1e;
  }
</style>
</head>
<body>
<svg width="1100" height="850" viewBox="0 0 1100 850">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1e1e1e" />
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#27ae60" />
    </marker>
    <marker id="arrowhead-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c0392b" />
    </marker>
    <pattern id="diag-stripes" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="#fcf8e3" />
      <line x1="0" y1="0" x2="0" y2="10" stroke="#e8d9a0" stroke-width="3" />
    </pattern>
  </defs>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="27" font-weight="bold">Plausible Deniability Flow</text>

  <!-- ============================================================ -->
  <!-- STEP 1: Alice composes two messages -->
  <!-- ============================================================ -->

  <text x="225" y="80" font-size="20" font-weight="bold" fill="#555">1</text>
  <text x="245" y="80" font-size="18" font-weight="bold">Alice writes two messages</text>

  <!-- Decoy message -->
  <rect x="225" y="100" width="260" height="80" rx="6"
        fill="#dff0d8" stroke="#1e1e1e" stroke-width="1.5" />
  <text x="245" y="125" font-size="13" fill="#555">Regular password</text>
  <text x="355" y="155" text-anchor="middle" font-size="16" font-weight="bold">"Sounds good, see you at 5"</text>

  <!-- Secret message -->
  <rect x="515" y="100" width="260" height="80" rx="6"
        fill="url(#diag-stripes)" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="8 4" />
  <text x="535" y="125" font-size="13" fill="#555">Hidden password</text>
  <text x="645" y="155" text-anchor="middle" font-size="16" font-weight="bold">"The documents are in..."</text>

  <!-- ============================================================ -->
  <!-- STEP 2: Encrypted into one message -->
  <!-- ============================================================ -->

  <!-- Arrows down from both messages -->
  <path d="M 355,180 L 355,220 C 355,240 500,240 500,240 L 500,250"
        fill="none" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <path d="M 645,180 L 645,220 C 645,240 500,240 500,240 L 500,250"
        fill="none" stroke="#1e1e1e" stroke-width="1.5" />

  <text x="225" y="275" font-size="20" font-weight="bold" fill="#555">2</text>
  <text x="245" y="275" font-size="18" font-weight="bold">Encrypted into one block pair</text>

  <!-- Block pair -->
  <rect x="225" y="295" width="550" height="70" rx="4"
        fill="none" stroke="#1e1e1e" stroke-width="2" />

  <rect x="230" y="300" width="40" height="60" rx="2"
        fill="#f0e6ff" stroke="#1e1e1e" stroke-width="1" />
  <text x="250" y="335" text-anchor="middle" font-size="10">Hdr</text>

  <rect x="275" y="300" width="245" height="60" rx="2"
        fill="#dff0d8" stroke="#1e1e1e" stroke-width="1" />
  <text x="397" y="335" text-anchor="middle" font-size="14">Encrypted Regular</text>

  <rect x="525" y="300" width="245" height="60" rx="2"
        fill="url(#diag-stripes)" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="6 3" />
  <text x="647" y="335" text-anchor="middle" font-size="14">Encrypted Hidden</text>

  <!-- ============================================================ -->
  <!-- STEP 3: Sent via Signal -->
  <!-- ============================================================ -->

  <path d="M 500,365 L 500,400"
        fill="none" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <text x="225" y="430" font-size="20" font-weight="bold" fill="#555">3</text>
  <text x="245" y="430" font-size="18" font-weight="bold">Sent to Bob via Signal</text>

  <rect x="225" y="445" width="550" height="50" rx="25"
        fill="#d4e6f9" stroke="#3498db" stroke-width="1.5" />
  <text x="500" y="476" text-anchor="middle" font-size="15" fill="#2c3e50">Signal encrypted transport</text>

  <!-- ============================================================ -->
  <!-- STEP 4: Fork — two scenarios -->
  <!-- ============================================================ -->

  <!-- Arrow splitting into two paths -->
  <path d="M 500,495 L 500,530"
        fill="none" stroke="#1e1e1e" stroke-width="1.5" />
  <path d="M 500,530 L 270,570"
        fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead-green)" />
  <path d="M 500,530 L 730,570"
        fill="none" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowhead-red)" />

  <text x="500" y="560" text-anchor="middle" font-size="16" font-weight="bold">Bob receives the message</text>

  <!-- ============================================================ -->
  <!-- LEFT: Safe scenario -->
  <!-- ============================================================ -->

  <rect x="50" y="580" width="440" height="250" rx="8"
        fill="#eafaf1" stroke="#27ae60" stroke-width="2" />

  <text x="270" y="610" text-anchor="middle" font-size="20" font-weight="bold" fill="#27ae60">In Private</text>
  <text x="270" y="635" text-anchor="middle" font-size="14" fill="#555">Bob enters both passwords</text>

  <!-- Both messages revealed -->
  <rect x="83" y="655" width="180" height="65" rx="4"
        fill="#dff0d8" stroke="#1e1e1e" stroke-width="1" />
  <text x="173" y="678" text-anchor="middle" font-size="12" fill="#555">Regular password</text>
  <text x="173" y="700" text-anchor="middle" font-size="14" font-weight="bold">"...see you at 5"</text>

  <text x="270" y="692" text-anchor="middle" font-size="18" fill="#27ae60">+</text>

  <rect x="278" y="655" width="180" height="65" rx="4"
        fill="#e8d898" stroke="#1e1e1e" stroke-width="1" />
  <text x="368" y="678" text-anchor="middle" font-size="12" fill="#555">Hidden password</text>
  <text x="368" y="700" text-anchor="middle" font-size="14" font-weight="bold">"The documents..."</text>

  <text x="270" y="800" text-anchor="middle" font-size="16" fill="#27ae60" font-weight="bold">Both layers visible</text>

  <!-- ============================================================ -->
  <!-- RIGHT: Duress scenario -->
  <!-- ============================================================ -->

  <rect x="510" y="580" width="440" height="250" rx="8"
        fill="#fdedec" stroke="#c0392b" stroke-width="2" />

  <text x="730" y="610" text-anchor="middle" font-size="20" font-weight="bold" fill="#c0392b">Under Duress</text>
  <text x="730" y="635" text-anchor="middle" font-size="14" fill="#555">Bob enters only regular password</text>

  <!-- Only regular message revealed -->
  <rect x="530" y="655" width="190" height="65" rx="4"
        fill="#dff0d8" stroke="#1e1e1e" stroke-width="1" />
  <text x="625" y="678" text-anchor="middle" font-size="12" fill="#555">Regular password</text>
  <text x="625" y="700" text-anchor="middle" font-size="14" font-weight="bold">"...see you at 5"</text>

  <!-- Hidden stays hidden -->
  <rect x="740" y="655" width="190" height="65" rx="4"
        fill="#e8e8e8" stroke="#bbb" stroke-width="1.5" stroke-dasharray="6 3" />
  <text x="835" y="685" text-anchor="middle" font-size="14" fill="#999">Random noise?</text>
  <text x="835" y="705" text-anchor="middle" font-size="14" fill="#999">Who knows.</text>

  <text x="730" y="770" text-anchor="middle" font-size="16" fill="#c0392b" font-weight="bold">Hidden layer denied</text>
  <text x="730" y="795" text-anchor="middle" font-size="14" fill="#555">No proof it was ever there</text>
</svg>
</body>
</html>
